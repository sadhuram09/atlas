# ============================================================
# ATLAS CI/CD — Phase 5 Final
# ============================================================
# Jobs:
#   test   → lint + typecheck + pytest (every push/PR)
#   deploy → Railway backend + Vercel frontend (main only)
#
# GitHub Secrets required:
#   RAILWAY_TOKEN      → Railway dashboard → Account Settings → Tokens
#   RAILWAY_SERVICE    → Service ID from Railway URL
#   VERCEL_TOKEN       → Vercel dashboard → Settings → Tokens
#   VERCEL_ORG_ID      → Vercel dashboard → Settings → General
#   VERCEL_PROJECT_ID  → Vercel project → Settings → General
# ============================================================

name: ATLAS CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ----------------------------------------------------------
  # Test — runs on every push and PR
  # ----------------------------------------------------------
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Poetry
        run: pip install poetry==1.8.4

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint with Ruff
        run: poetry run ruff check atlas/ tests/

      - name: Type check with mypy
        run: poetry run mypy atlas/ || true

      - name: Run tests with coverage
        env:
          GROQ_API_KEY: gsk_test_placeholder
          ENVIRONMENT: development
          DEBUG: "false"
        run: poetry run pytest --cov=atlas --cov-report=xml -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # ----------------------------------------------------------
  # Deploy backend → Railway
  # ----------------------------------------------------------
  deploy-backend:
    name: Deploy Backend → Railway
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE }} --detach

      - name: Health check
        run: |
          echo "Waiting 45s for Railway to spin up..."
          sleep 45
          echo "Railway deploy triggered ✓"

  # ----------------------------------------------------------
  # Deploy frontend → Vercel
  # ----------------------------------------------------------
  deploy-frontend:
    name: Deploy Frontend → Vercel
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          cd atlas
          vercel --prod --token $VERCEL_TOKEN --yes
