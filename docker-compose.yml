# ============================================================
# ATLAS Docker Compose — Local Development
# ============================================================
#
# Starts:
#   - ATLAS API (with hot reload)
#   - PostgreSQL (for Phase 2 event store)
#
# Usage:
#   docker compose up           # Start everything
#   docker compose up --build   # Rebuild after code changes
#   docker compose down -v      # Stop + delete volumes (fresh DB)
# ============================================================

services:
  # ----------------------------------------------------------
  # ATLAS API
  # ----------------------------------------------------------
  api:
    build:
      context: .
      target: builder     # Use builder stage so dev deps are available
    command: >
      uvicorn atlas.api.app:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir atlas
    volumes:
      # Mount source code for hot-reload
      - .:/app
      - /app/.venv         # Don't overwrite the installed venv
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://atlas:atlas@db:5432/atlas
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------
  # PostgreSQL — event store + task persistence (Phase 2+)
  # ----------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"     # Expose so you can connect with psql / pgAdmin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
    driver: local
